name: Deploy – Backend Lambda + Terraform

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION:     ${{ secrets.AWS_REGION }}
  TF_WORKING_DIR: ./terraform

jobs:
  # ============================================================
  # JOB 1 – BUILD & TEST
  # ============================================================
  build:
    name: "✔ Build & Test"
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Instalar dependencias
        run: npm install

      - name: Ejecutar pruebas
        run: npm test

      - name: Empaquetar Lambda (ZIP)
        run: |
          echo "📦 Creando lambda.zip..."
          zip -r lambda.zip \
            src/ \
            node_modules/ \
            package.json \
            -x "*/node_modules/.cache/*" \
            -x "*/.git/*" \
            -x "*/*.test.js" \
            -x "*/*.spec.js"
          echo "✅ lambda.zip: $(du -sh lambda.zip | cut -f1)"

      - name: Subir lambda.zip como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: lambda-package
          path: backend/lambda.zip
          retention-days: 1

  # ============================================================
  # JOB 2 – TERRAFORM (init/validate/plan siempre; apply solo si
  #          la función Lambda NO existe todavía)
  # ============================================================
  terraform:
    name: "✔ Terraform Plan & Apply"
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'

    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Descargar artefacto lambda.zip
        uses: actions/download-artifact@v4
        with:
          name: lambda-package
          path: backend/

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      # Verificar si la Lambda ya existe para decidir si hacer apply
      - name: Verificar si Lambda ya existe
        id: check_lambda
        run: |
          if aws lambda get-function --function-name app-felix-api-production \
               --region ${{ secrets.AWS_REGION }} > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "✅ Lambda ya existe – saltando terraform apply"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "🆕 Lambda no existe – ejecutando terraform apply"
          fi

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: "✔ Terraform Init"
        run: terraform init

      - name: "✔ Terraform Validate"
        run: terraform validate

      - name: "✔ Terraform Plan"
        run: |
          terraform plan \
            -var="database_url=${{ secrets.DATABASE_URL }}" \
            -var="jwt_secret=${{ secrets.JWT_SECRET }}" \
            -out=tfplan
        env:
          TF_VAR_aws_region: ${{ secrets.AWS_REGION }}

      - name: "✔ Terraform Apply"
        if: steps.check_lambda.outputs.exists == 'false'
        run: terraform apply -auto-approve tfplan

      - name: Resumen del despliegue
        run: |
          echo "## 🚀 Terraform ejecutado exitosamente" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Recurso | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Lambda** | app-felix-api-production |" >> $GITHUB_STEP_SUMMARY
          echo "| **S3 Bucket** | app-felix-uploads-production |" >> $GITHUB_STEP_SUMMARY
          echo "| **API URL** | https://93qa9dr0p2.execute-api.${{ secrets.AWS_REGION }}.amazonaws.com |" >> $GITHUB_STEP_SUMMARY
          echo "| **Health Check** | https://93qa9dr0p2.execute-api.${{ secrets.AWS_REGION }}.amazonaws.com/health |" >> $GITHUB_STEP_SUMMARY

  # ============================================================
  # JOB 3 – DEPLOY LAMBDA (siempre actualiza el código)
  # ============================================================
  deploy:
    name: "✔ Deploy Lambda"
    runs-on: ubuntu-latest
    needs: terraform
    if: github.event_name == 'push'

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Descargar artefacto lambda.zip
        uses: actions/download-artifact@v4
        with:
          name: lambda-package
          path: backend/

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Actualizar código de Lambda
        run: |
          echo "🔄 Actualizando Lambda: app-felix-api-production"
          aws lambda update-function-code \
            --function-name app-felix-api-production \
            --zip-file fileb://backend/lambda.zip \
            --region ${{ secrets.AWS_REGION }}
          echo "✅ Lambda actualizada"

      - name: Esperar que Lambda esté lista
        run: |
          aws lambda wait function-updated \
            --function-name app-felix-api-production \
            --region ${{ secrets.AWS_REGION }}
          echo "✅ Lambda lista y activa"
