name: Deploy – Backend Lambda + Terraform

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION:     ${{ secrets.AWS_REGION }}
  TF_WORKING_DIR: ./terraform

jobs:
  # ============================================================
  # JOB 1 – BUILD & TEST
  # ============================================================
  build:
    name: "✔ Build & Test"
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Instalar dependencias
        run: npm install

      - name: Ejecutar pruebas
        run: npm test

      - name: Empaquetar Lambda (ZIP)
        run: |
          echo "📦 Creando lambda.zip..."
          zip -r lambda.zip \
            src/ \
            node_modules/ \
            package.json \
            -x "*/node_modules/.cache/*" \
            -x "*/.git/*" \
            -x "*/*.test.js" \
            -x "*/*.spec.js"
          echo "✅ lambda.zip: $(du -sh lambda.zip | cut -f1)"

      - name: Subir lambda.zip como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: lambda-package
          path: backend/lambda.zip
          retention-days: 1

  # ============================================================
  # JOB 2 – TERRAFORM (init/validate/plan siempre; apply solo si
  #          la función Lambda NO existe todavía)
  # ============================================================
  terraform:
    name: "✔ Terraform Plan & Apply"
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'

    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Descargar artefacto lambda.zip
        uses: actions/download-artifact@v4
        with:
          name: lambda-package
          path: backend/

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: "✔ Terraform Init"
        run: terraform init

      - name: "✔ Terraform Validate"
        run: terraform validate

      # Importar recursos existentes para que Terraform no intente recrearlos
      - name: Importar recursos existentes
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          REGION=${{ secrets.AWS_REGION }}

          import_if_missing() {
            local resource=$1
            local id=$2
            terraform state show "$resource" > /dev/null 2>&1 || \
              terraform import \
                -var="database_url=${{ secrets.DATABASE_URL }}" \
                -var="jwt_secret=${{ secrets.JWT_SECRET }}" \
                "$resource" "$id" 2>&1 || true
          }

          # ── S3 ──────────────────────────────────────────────
          import_if_missing "aws_s3_bucket.uploads" \
            "app-felix-uploads-production"

          # ── CloudWatch ──────────────────────────────────────
          import_if_missing "aws_cloudwatch_log_group.lambda_logs" \
            "/aws/lambda/app-felix-api-production"

          import_if_missing "aws_cloudwatch_log_group.notification_lambda_logs" \
            "/aws/lambda/app-felix-notification-lambda-production"

          # ── IAM Roles ───────────────────────────────────────
          import_if_missing "aws_iam_role.lambda_exec" \
            "app-felix-lambda-role-production"

          import_if_missing "aws_iam_role.notification_lambda_exec" \
            "app-felix-notification-lambda-role-production"

          # ── Lambda Functions ────────────────────────────────
          import_if_missing "aws_lambda_function.api" \
            "app-felix-api-production"

          import_if_missing "aws_lambda_function.notification" \
            "app-felix-notification-lambda-production"

          # ── Lambda Permission ───────────────────────────────
          import_if_missing "aws_lambda_permission.apigw" \
            "app-felix-api-production/AllowAPIGatewayInvoke"

          # ── Event Source Mapping ────────────────────────────
          import_if_missing "aws_lambda_event_source_mapping.sqs_to_notification_lambda" \
            "acee480d-09b5-446f-ae99-c0c106e274f9"

          # ── SNS ─────────────────────────────────────────────
          SNS_ARN="arn:aws:sns:${REGION}:${ACCOUNT_ID}:app-felix-notifications-production"
          import_if_missing "aws_sns_topic.notifications" "$SNS_ARN"

          # ── SQS ─────────────────────────────────────────────
          SQS_URL="https://sqs.${REGION}.amazonaws.com/${ACCOUNT_ID}/app-felix-notifications-production"
          SQS_DLQ_URL="https://sqs.${REGION}.amazonaws.com/${ACCOUNT_ID}/app-felix-notifications-dlq-production"
          import_if_missing "aws_sqs_queue.notifications" "$SQS_URL"
          import_if_missing "aws_sqs_queue.notifications_dlq" "$SQS_DLQ_URL"
          import_if_missing "aws_sqs_queue_policy.notifications" "$SQS_URL"

          # ── SNS Subscription ────────────────────────────────
          SUB_ARN=$(aws sns list-subscriptions-by-topic \
            --topic-arn "$SNS_ARN" \
            --region "$REGION" \
            --query "Subscriptions[0].SubscriptionArn" \
            --output text 2>/dev/null || echo "")
          if [ -n "$SUB_ARN" ] && [ "$SUB_ARN" != "None" ] && [ "$SUB_ARN" != "PendingConfirmation" ]; then
            import_if_missing "aws_sns_topic_subscription.sns_to_sqs" "$SUB_ARN"
          fi

          # ── API Gateway (importar el activo: 93ga9dr0p2) ────
          import_if_missing "aws_apigatewayv2_api.http_api" \
            "93ga9dr0p2"

          import_if_missing "aws_apigatewayv2_stage.default" \
            "93ga9dr0p2/\$default"

          echo "✅ Import completado"
        env:
          TF_VAR_database_url: ${{ secrets.DATABASE_URL }}
          TF_VAR_jwt_secret:   ${{ secrets.JWT_SECRET }}
          TF_VAR_aws_region:   ${{ secrets.AWS_REGION }}

      - name: "✔ Terraform Plan"
        run: |
          terraform plan \
            -var="database_url=${{ secrets.DATABASE_URL }}" \
            -var="jwt_secret=${{ secrets.JWT_SECRET }}" \
            -out=tfplan
        env:
          TF_VAR_aws_region: ${{ secrets.AWS_REGION }}

      - name: "✔ Terraform Apply"
        run: terraform apply -auto-approve tfplan

      # Actualizar SNS_TOPIC_ARN en la Lambda principal (siempre)
      - name: Actualizar variables de entorno Lambda principal
        run: |
          SNS_ARN=$(aws sns list-topics --region ${{ secrets.AWS_REGION }} \
            --query "Topics[?contains(TopicArn,'app-felix-notifications')].TopicArn" \
            --output text)
          if [ -n "$SNS_ARN" ]; then
            echo "🔧 Actualizando SNS_TOPIC_ARN en Lambda principal: $SNS_ARN"
            aws lambda update-function-configuration \
              --function-name app-felix-api-production \
              --region ${{ secrets.AWS_REGION }} \
              --environment "Variables={NODE_ENV=production,DATABASE_URL=${{ secrets.DATABASE_URL }},JWT_SECRET=${{ secrets.JWT_SECRET }},JWT_EXPIRES_IN=7d,S3_BUCKET=app-felix-uploads-production,AWS_S3_REGION=${{ secrets.AWS_REGION }},UPLOAD_DIR=uploads,SNS_TOPIC_ARN=$SNS_ARN}" \
              > /dev/null
            echo "✅ SNS_TOPIC_ARN actualizado"
          fi

      - name: Resumen del despliegue
        run: |
          echo "## 🚀 Terraform ejecutado exitosamente" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Recurso | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Lambda** | app-felix-api-production |" >> $GITHUB_STEP_SUMMARY
          echo "| **S3 Bucket** | app-felix-uploads-production |" >> $GITHUB_STEP_SUMMARY
          echo "| **API URL** | https://93ga9dr0p2.execute-api.${{ secrets.AWS_REGION }}.amazonaws.com |" >> $GITHUB_STEP_SUMMARY
          echo "| **Health Check** | https://93ga9dr0p2.execute-api.${{ secrets.AWS_REGION }}.amazonaws.com/health |" >> $GITHUB_STEP_SUMMARY

  # ============================================================
  # JOB 3 – DEPLOY LAMBDA (siempre actualiza el código)
  # ============================================================
  deploy:
    name: "✔ Deploy Lambda"
    runs-on: ubuntu-latest
    needs: terraform
    if: github.event_name == 'push'

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Descargar artefacto lambda.zip
        uses: actions/download-artifact@v4
        with:
          name: lambda-package
          path: backend/

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Actualizar código de Lambda
        run: |
          echo "🔄 Actualizando Lambda: app-felix-api-production"
          aws lambda update-function-code \
            --function-name app-felix-api-production \
            --zip-file fileb://backend/lambda.zip \
            --region ${{ secrets.AWS_REGION }}
          echo "✅ Lambda actualizada"

      - name: Esperar que Lambda esté lista
        run: |
          aws lambda wait function-updated \
            --function-name app-felix-api-production \
            --region ${{ secrets.AWS_REGION }}
          echo "✅ Lambda lista y activa"
